<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ARspace · Viewer</title>

  <!--
    model-viewer: Google library για 3D/AR στο browser.
    Υποστηρίζει:
      - WebXR (Android Chrome)
      - Scene Viewer (Android)
      - Quick Look (iOS Safari)
    Φορτώνουμε ως <script type="module"> — αυτό σημαίνει
    ότι εκτελείται ασύγχρονα χωρίς να μπλοκάρει το page render.
  -->
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>

  <style>
    :root {
      --bg:      #0A0A0F;
      --surface: rgba(19,19,28,0.92);
      --border:  #2A2A3E;
      --gold:    #C8A96E;
      --gold-dim:#8A7048;
      --cream:   #F5F0E8;
      --muted:   #6B6B8A;
      --error:   #E05C5C;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100dvh;      /* dvh = dynamic viewport height — σωστό σε mobile */
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── LOADING ─────────────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;   /* inset: 0 = top:0 right:0 bottom:0 left:0 */
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 200;
    }

    .loading-logo { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 22px; height: 22px;
      border: 2px solid var(--gold);
      transform: rotate(45deg);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .logo-text span { color: var(--gold); }

    /* Bouncing dots animation */
    .spinner { display: flex; gap: 6px; }

    .spinner span {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1s ease-in-out infinite;
    }

    .spinner span:nth-child(2) { animation-delay: 0.15s; }
    .spinner span:nth-child(3) { animation-delay: 0.30s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40%            { opacity: 1;   transform: translateY(-4px); }
    }

    /* ── ERROR ───────────────────────────────────────── */
    #error-screen {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 200;
    }

    #error-screen h2 { color: var(--error); font-size: 16px; font-weight: 600; }
    #error-screen p  { color: var(--muted); font-size: 13px; }

    /* ── SPLASH SCREEN ───────────────────────────────── */
    /*
      Εμφανίζεται μετά το loading, πριν το AR.
      Σκοπός: να δώσει context (τι αντικείμενο βλέπεις) πριν ανοίξει η κάμερα.
      
      Χρησιμοποιούμε display:none → display:flex για toggle.
      Δεν χρησιμοποιούμε visibility:hidden ή opacity:0 γιατί δεν αφαιρούν
      το space του element από το layout.
    */
    #splash-screen {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 32px 52px;
      z-index: 150;
    }

    .splash-logo { display: flex; align-items: center; gap: 10px; opacity: 0.6; }
    .splash-logo .logo-mark { width: 18px; height: 18px; border: 1.5px solid var(--gold); }
    .splash-logo .logo-text { font-size: 13px; }

    .splash-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    /* Διακοσμητικό διαμάντι — CSS-only, χωρίς εικόνα */
    .splash-icon {
      width: 64px; height: 64px;
      border: 2px solid var(--gold);
      transform: rotate(45deg);
      margin-bottom: 8px;
      position: relative;
    }

    .splash-icon::after {
      content: '';
      position: absolute;
      inset: 14px;
      background: var(--gold);
      opacity: 0.15;
    }

    .splash-label {
      font-size: 11px;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    #splash-object-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.2;
      max-width: 280px;
    }

    .splash-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    /*
      min-height: 56px → Apple HIG συνιστά minimum 44pt tap target.
      -webkit-tap-highlight-color: transparent → αφαιρεί το μπλε flash στο tap σε iOS.
    */
    #btn-view-ar {
      width: 100%;
      max-width: 320px;
      min-height: 56px;
      background: var(--gold);
      color: #0A0A0F;
      border: none;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-view-ar:active { opacity: 0.85; transform: scale(0.98); }

    .btn-icon { font-size: 20px; line-height: 1; }

    .splash-hint {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      max-width: 240px;
    }

    .splash-hint strong { color: var(--cream); font-weight: 400; }

    /* ── TOP BAR ─────────────────────────────────────── */
    #top-bar {
      display: none;
      padding: 14px 20px;
      background: var(--surface);
      backdrop-filter: blur(12px);        /* glass effect */
      border-bottom: 1px solid rgba(255,255,255,0.05);
      z-index: 10;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;                     /* δεν συρρικνώνεται αν το περιεχόμενο μεγαλώσει */
    }

    #scene-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;            /* "..." αν είναι πολύ μακρύ */
      max-width: 60%;
    }

    #obj-badge {
      font-size: 11px;
      color: var(--gold);
      background: rgba(200,169,110,0.1);
      border: 1px solid rgba(200,169,110,0.2);
      border-radius: 3px;
      padding: 2px 8px;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.06em;
    }

    /* ── VIEWER AREA ─────────────────────────────────── */
    /*
      flex: 1 = καταλαμβάνει όλο τον υπόλοιπο χώρο μεταξύ top-bar και nav.
      Αυτό είναι το βασικό trick για full-screen layouts με flexbox.
    */
    #viewer-area { flex: 1; position: relative; overflow: hidden; }

    model-viewer {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      background: transparent;
      opacity: 0;
      pointer-events: none;                /* δεν δέχεται clicks όταν είναι κρυφό */
      transition: opacity 0.35s ease;
    }

    model-viewer.active {
      opacity: 1;
      pointer-events: auto;
    }

    model-viewer::part(ar-button) {
      /*
        Κρύβουμε το default AR button του model-viewer.
        Το αντικαθιστούμε με το δικό μας κουμπί στο splash screen,
        έτσι ώστε ο χρήστης να μην βλέπει δύο κουμπιά.
        
        ::part() είναι CSS Shadow Parts — τρόπος να στυλάρεις στοιχεία
        μέσα σε Shadow DOM (το εσωτερικό του web component).
      */
      display: none;
    }

    /* ── NAV BAR (εμφανίζεται μόνο αν > 1 object) ───── */
    #nav {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--cream);
      border-radius: 4px;
      width: 38px; height: 38px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    .nav-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      padding: 0 12px;
    }

    #nav-dots { display: flex; gap: 5px; }

    .nav-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .nav-dot.active { background: var(--gold); transform: scale(1.3); }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Loading screen: εμφανίζεται μέχρι να φορτώσουν τα δεδομένα από τη Supabase -->
  <div id="loading-screen">
    <div class="loading-logo">
      <div class="logo-mark"></div>
      <span class="logo-text">AR<span>space</span></span>
    </div>
    <div class="spinner"><span></span><span></span><span></span></div>
  </div>

  <!-- Error screen: εμφανίζεται αν η scene δεν βρεθεί -->
  <div id="error-screen">
    <h2>Scene not found</h2>
    <p id="error-msg">The scene could not be loaded.</p>
  </div>

  <!--
    Splash screen: εμφανίζεται ΜΕΤΑ το loading, ΠΡΙΝ το AR.
    
    Γιατί υπάρχει αυτό το βήμα;
    1. Δίνει context: "τι πρόκειται να δω;"
    2. Απαιτεί συνειδητό tap για AR — οι browsers απαιτούν user gesture
       πριν ανοίξουν η κάμερα (για privacy).
    3. Εξηγεί τι να κάνει ο χρήστης ("point at floor").
  -->
  <div id="splash-screen">
    <div class="splash-logo">
      <div class="logo-mark"></div>
      <span class="logo-text">AR<span>space</span></span>
    </div>

    <div class="splash-body">
      <div class="splash-icon"></div>
      <div class="splash-label">Museum Object</div>
      <!--
        Αυτό το div συμπληρώνεται δυναμικά από τη JS
        με το όνομα της scene που φορτώνουμε από τη Supabase.
      -->
      <div id="splash-object-name">Loading…</div>
    </div>

    <div class="splash-footer">
      <button id="btn-view-ar" onclick="startAR()">
        <span class="btn-icon">📷</span>
        View in AR
      </button>
      <p class="splash-hint">
        <strong>Point your camera at the floor</strong>
        and tap to place the object
      </p>
    </div>
  </div>

  <!-- Top bar: εμφανίζεται μετά το splash -->
  <div id="top-bar">
    <div id="scene-title">—</div>
    <div id="obj-badge">—</div>
  </div>

  <!--
    Εδώ μπαίνουν τα <model-viewer> elements δυναμικά από τη JS.
    Δεν τα βάζουμε στο HTML γιατί δεν ξέρουμε πόσα objects έχει η scene.
  -->
  <div id="viewer-area"></div>

  <!-- Nav: εμφανίζεται μόνο αν η scene έχει > 1 object -->
  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">←</button>
    <div class="nav-center">
      <div id="nav-dots"></div>
    </div>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">→</button>
  </div>

  <script>
    /* ── CONFIG ─────────────────────────────────────── */
    const SUPABASE_URL = 'https://meapegkxexcmqoznxuny.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lYXBlZ2t4ZXhjbXFvem54dW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzM2NTgsImV4cCI6MjA5Njg0OTY1OH0.w78iMnDz4wZPYt-R_r2w-Fho0sSenIxQDsWKUKvzhEA';

    /* ── STATE ──────────────────────────────────────── */
    let currentIndex = 0;   /* ποιο object βλέπουμε τώρα */
    let viewers      = [];  /* πίνακας με τα <model-viewer> elements */
    let sceneData    = null; /* αποθηκεύουμε τα data για να τα χρησιμοποιήσουμε στο startAR() */

    /* ── Παίρνει το ?id= από το URL ─────────────────── */
    function getSceneId() {
      /*
        window.location.search = "?id=abc-123"
        URLSearchParams το αναλύει και παίρνουμε το "abc-123"
      */
      return new URLSearchParams(window.location.search).get('id');
    }

    /* ── Supabase GET helper ─────────────────────────── */
    /*
      Βοηθητική συνάρτηση για GET requests στη Supabase.
      Γιατί ξεχωριστή συνάρτηση; Για να μην επαναλαμβάνουμε τα headers
      κάθε φορά. DRY principle: Don't Repeat Yourself.
    */
    async function supabaseGet(path) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          'apikey':        SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    /* ── loadScene ──────────────────────────────────── */
    /*
      Αυτή η συνάρτηση καλείται αμέσως κατά τη φόρτωση της σελίδας.
      Κατεβάζει τα δεδομένα από τη Supabase και εμφανίζει το splash.
      
      Γιατί δύο ξεχωριστά requests (scenes + objects);
      Γιατί θέλουμε το name από τον πίνακα scenes
      και τα asset_url/scale από τον πίνακα objects.
      Θα μπορούσαμε να τα κάνουμε join με select=*,objects(*),
      αλλά η ξεχωριστή προσέγγιση είναι πιο ξεκάθαρη.
    */
    async function loadScene() {
      const sceneId = getSceneId();
      if (!sceneId) { showError('No scene ID in URL.'); return; }

      try {
        /* Φόρτωσε τη scene (για το name) */
        const scenes = await supabaseGet(
          `scenes?id=eq.${sceneId}&select=id,name&limit=1`
        );
        if (!scenes.length) { showError('Scene not found.'); return; }

        /* Φόρτωσε όλα τα objects αυτής της scene, ταξινομημένα */
        const objects = await supabaseGet(
          `objects?scene_id=eq.${sceneId}&select=id,asset_url,scale&order=id.asc`
        );
        if (!objects.length) { showError('This scene has no objects.'); return; }

        /*
          Αποθηκεύουμε τα δεδομένα και δεν χτίζουμε τα viewers ακόμα.
          
          ΓΙΑΤΙ; Lazy loading — τα .glb αρχεία δεν κατεβαίνουν πριν
          ο χρήστης πατήσει "View in AR". Αυτό κάνει το splash να φορτώσει
          πολύ πιο γρήγορα. Σκέψου: ένα .glb μπορεί να είναι 50MB.
        */
        sceneData = { scene: scenes[0], objects };

        /* Ενημέρωσε το splash με το όνομα */
        document.getElementById('splash-object-name').textContent = scenes[0].name;

        if (objects.length > 1) {
          document.querySelector('.splash-label').textContent =
            `${objects.length} Objects`;
        }

        /* Κρύψε loading, δείξε splash */
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('splash-screen').style.display = 'flex';

      } catch (err) {
        console.error(err);
        showError('Error: ' + err.message);
      }
    }

    /* ── startAR ────────────────────────────────────── */
    /*
      Καλείται όταν ο χρήστης πατήσει "View in AR".
      
      Ροή:
      1. Κρύψε splash
      2. Δείξε UI (top-bar, viewer-area, nav)
      3. Δημιούργησε τα <model-viewer> elements
      4. Κάλεσε activateAR() στο πρώτο — ανοίγει αμέσως η κάμερα
    */
    async function startAR() {
      document.getElementById('splash-screen').style.display = 'none';
      document.getElementById('top-bar').style.display  = 'flex';
      document.getElementById('scene-title').textContent = sceneData.scene.name;

      buildViewers(sceneData.objects);

      if (sceneData.objects.length > 1) {
        document.getElementById('nav').style.display = 'flex';
        buildDots(sceneData.objects.length);
      }

      showObject(0);

      /*
        activateAR() = το official API του <model-viewer> για AR.
        Πρέπει να περιμένουμε το model να φορτώσει ('load' event)
        πριν το καλέσουμε, αλλιώς θα αποτύχει σιωπηλά.
        
        canActivateAR: false σε desktop browsers — η AR δεν υποστηρίζεται.
        Σε αυτή την περίπτωση ο χρήστης βλέπει το 3D model κανονικά.
      */
      const firstViewer = viewers[0];

      const tryActivateAR = () => {
        if (firstViewer.canActivateAR) {
          firstViewer.activateAR();
        }
      };

      if (firstViewer.loaded) {
        tryActivateAR();
      } else {
        /* { once: true } = ο listener αφαιρείται αυτόματα μετά την πρώτη φορά */
        firstViewer.addEventListener('load', tryActivateAR, { once: true });
      }
    }

    /* ── buildViewers ───────────────────────────────── */
    /*
      Δημιουργεί ένα <model-viewer> για κάθε object.
      
      Γιατί ένα model-viewer ανά object αντί να αλλάζουμε το src;
      Γιατί αν αλλάξεις το src, το model-viewer ξεκινάει νέο loading
      από μηδέν. Με πολλαπλά viewers, το δεύτερο model είναι ήδη
      φορτωμένο στο background όταν πας σε αυτό.
    */
    function buildViewers(objects) {
      const area = document.getElementById('viewer-area');

      objects.forEach((obj, i) => {
        const mv = document.createElement('model-viewer');

        mv.setAttribute('src',   obj.asset_url);
        mv.setAttribute('alt',   `Object ${i + 1}`);

        /* Scale: ένας αριθμός → "x y z" string (και οι 3 ίδιοι) */
        const s = obj.scale || 1;
        mv.setAttribute('scale', `${s} ${s} ${s}`);

        mv.setAttribute('camera-controls', '');          /* drag to rotate */
        mv.setAttribute('ar', '');                       /* ενεργοποίηση AR */
        mv.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
        mv.setAttribute('auto-rotate', '');
        mv.setAttribute('auto-rotate-delay', '1000');
        mv.setAttribute('environment-image', 'neutral'); /* neutral lighting */

        /*
          loading="eager" για το πρώτο (θέλουμε να είναι έτοιμο αμέσως),
          loading="lazy" για τα υπόλοιπα (φορτώνουν μόνο αν τα δεις).
        */
        mv.setAttribute('loading', i === 0 ? 'eager' : 'lazy');

        area.appendChild(mv);
        viewers.push(mv);
      });
    }

    /* ── buildDots ──────────────────────────────────── */
    function buildDots(count) {
      const container = document.getElementById('nav-dots');
      for (let i = 0; i < count; i++) {
        const dot = document.createElement('div');
        dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
        dot.onclick   = () => showObject(i);
        container.appendChild(dot);
      }
    }

    /* ── showObject ─────────────────────────────────── */
    /*
      Εμφανίζει το object στη θέση i και κρύβει τα υπόλοιπα.
      
      classList.toggle(className, condition):
        condition = true  → προσθέτει την class
        condition = false → αφαιρεί την class
    */
    function showObject(i) {
      viewers.forEach((mv, idx) =>
        mv.classList.toggle('active', idx === i)
      );

      currentIndex = i;

      document.getElementById('obj-badge').textContent = `${i + 1} / ${viewers.length}`;
      document.getElementById('btn-prev').disabled = (i === 0);
      document.getElementById('btn-next').disabled = (i === viewers.length - 1);

      document.querySelectorAll('.nav-dot').forEach((d, idx) =>
        d.classList.toggle('active', idx === i)
      );
    }

    /* ── navigate ───────────────────────────────────── */
    function navigate(dir) {
      const next = currentIndex + dir;
      if (next >= 0 && next < viewers.length) showObject(next);
    }

    /* ── showError ──────────────────────────────────── */
    function showError(msg) {
      document.getElementById('loading-screen').style.display = 'none';
      const s = document.getElementById('error-screen');
      s.style.display = 'flex';
      document.getElementById('error-msg').textContent = msg;
    }

    /* ── Keyboard navigation (για desktop testing) ─── */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    /* Ξεκίνα αμέσως */
    loadScene();
  </script>
</body>
</html>
