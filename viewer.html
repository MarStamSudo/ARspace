<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Experience</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body { margin: 0; background: #0A0A0F; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
    
    model-viewer { width: 100%; height: 100%; }

    #loading {
      position: absolute; color: #C8A96E;
      font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div id="loading">Loading AR...</div>

  <model-viewer 
    id="viewer" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    tone-mapping="neutral"
    shadow-intensity="1"
    environment-image="neutral">
  </model-viewer>

  <script>
    /* Το κλειδί σου. 
       Σημείωση: Είναι καλύτερο να μην έχεις το key χύμα στον κώδικα,
       αλλά για το τρέχον setup σου, είναι απαραίτητο.
    */
    const SUPABASE_URL  = 'https://meapegkxexcmqoznxuny.supabase.co';
    const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lYXBlZ2t4ZXhjbXFvem54dW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzM2NTgsImV4cCI6MjA5Njg0OTY1OH0.w78iMnDz4wZPYt-R_r2w-Fho0sSenIxQDsWKUKvzhEA';

    async function loadScene() {
      const urlParams = new URLSearchParams(window.location.search);
      const sceneId = urlParams.get('id'); // Παίρνει το id από το URL
      
      if (!sceneId) {
        document.getElementById('loading').textContent = 'Error: No scene ID';
        return;
      }

      try {
        // Fetch από τον πίνακα objects
        const response = await fetch(`${SUPABASE_URL}/rest/v1/objects?scene_id=eq.${sceneId}`, {
          headers: { 
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}` 
          }
        });

        const data = await response.json();
        
        if (data && data.length > 0) {
          const viewer = document.getElementById('viewer');
          const loading = document.getElementById('loading');
          
          viewer.src = data[0].asset_url;
          viewer.scale = `${data[0].scale} ${data[0].scale} ${data[0].scale}`;
          
          viewer.addEventListener('load', () => {
            loading.style.display = 'none';
          });
        } else {
          document.getElementById('loading').textContent = 'Scene not found';
        }
      } catch (err) {
        console.error(err);
        document.getElementById('loading').textContent = 'Error loading scene';
      }
    }

    loadScene();
  </script>
</body>
</html>
